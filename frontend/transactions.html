<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Transactions</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <script>

        if (!localStorage.getItem("loggedInUser")) {
            window.location.href = "login.html";
        }

        function logout() {
            localStorage.removeItem("loggedInUser");
            window.location.href = "login.html";
        }

    </script>

</head>

<body>

    <!-- Sidebar -->

    <div class="sidebar">

        <h2>💰 Finance Tracker</h2>

        <ul>

            <li><a href="dashboard.html">🏠 Dashboard</a></li>

            <li class="active">
                <a href="transactions.html">💳 Transactions</a>
            </li>

            <li><a href="analytics.html">📊 Analytics</a></li>

            <li><a href="budget.html">🎯 Budgets</a></li>

            <li><a href="insights.html">💡 Insights</a></li>

            <li><a href="report.html">📄 Reports</a></li>

            <li><a href="upload.html">📤 Upload Statement</a></li>

            <li><a href="settings.html">⚙️ Settings</a></li>

            <li><a href="#" onclick="logout()">🚪 Logout</a></li>

        </ul>

    </div>

    <!-- Main -->

    <div class="main">

        <h1>Transactions</h1>

        <!-- Add Transaction -->

        <div class="section">

            <h2>Add Transaction</h2>

            <input
                type="text"
                id="notes"
                placeholder="Example: Swiggy Order"
                required>

            <input
                type="text"
                id="payment_mode"
                placeholder="UPI / Card / Cash"
                required>

            <input
                type="text"
                id="location"
                placeholder="City"
                required>

            <input
                type="number"
                id="amount"
                placeholder="Amount (₹)"
                required>

            <input
                type="date"
                id="date"
                required>

            <button onclick="addTransaction()">

                Add Transaction

            </button>

        </div>

        <!-- Transaction History -->

        <div class="section">

            <div class="table-header">

                <h2>

                    Transaction History

                    <span id="transactionCount"></span>

                </h2>

                <input
                    type="text"
                    id="searchTransaction"
                    placeholder="🔍 Search by category or location...">

            </div>

            <table>

                <thead>

                    <tr>

                        <th>Date</th>

                        <th>Category</th>

                        <th>Amount</th>

                        <th>Location</th>

                        <th>Actions</th>

                    </tr>

                </thead>

                <tbody id="transactionTable">

                </tbody>

            </table>

        </div>

    </div>

    <script src="js/transactions.js"></script>

</body>

</html>
