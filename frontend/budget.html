<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <title>Budgets</title>

    <link rel="stylesheet" href="css/style.css">

</head>
<script>

if(!localStorage.getItem("loggedInUser")){

    window.location.href="login.html";

}

function logout(){

    localStorage.removeItem("loggedInUser");

    window.location.href="login.html";

}

</script>

<body>

<!-- Sidebar -->

<div class="sidebar">

    <h2>💰 Finance Tracker</h2>

    <ul>

        <li><a href="dashboard.html">🏠 Dashboard</a></li>

        <li><a href="transactions.html">💳 Transactions</a></li>

        <li><a href="analytics.html">📊 Analytics</a></li>

        <li><a href="budget.html">🎯 Budgets</a></li>

        <li><a href="insights.html">💡 Insights</a></li>

        <li><a href="report.html">📄 Reports</a></li>

        <li><a href="upload.html">📤 Upload Statement</a></li>

        <li><a href="settings.html">⚙️ Settings</a></li>

        <li><a href="#" onclick="logout()">🚪 Logout</a></li>

    </ul>

</div>


<!-- Main -->

<div class="main">

    <h1>Budgets</h1>

    <div class="section">

        <table>

            <thead>

                <tr>
                    <th>Category</th>
                    <th>Monthly Budget</th>
                </tr>

            </thead>

            <tbody id="budgetTable">

            </tbody>

        </table>

    </div>


    <!-- Add Budget -->

    <div class="section">

        <h2>Add Budget</h2>

        <input
            type="text"
            id="category"
            placeholder="Category">

        <input
            type="number"
            id="monthly_budget"
            placeholder="Monthly Budget">

        <button onclick="addBudget()">
            Add Budget
        </button>

    </div>
    <div class="section">

    <h2>⚠ Budget Alerts</h2>

    <div id="budgetAlerts">

    </div>

</div>
    <div class="section">

    <h2>Budget Status</h2>

    <table>

        <thead>

            <tr>

                <th>Category</th>
                <th>Budget</th>
                <th>Spent</th>
                <th>Remaining</th>

            </tr>

        </thead>

        <tbody id="budgetStatusTable">

        </tbody>

    </table>

</div>

</div>

<script src="js/budget.js"></script>

</body>

</html>
